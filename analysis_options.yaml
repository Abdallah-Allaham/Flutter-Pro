# ملف إعداد قواعد تحليل الكود - Flutter Pro Coding Standards
# هذا الملف يفرض معايير جودة صارمة (Strict Lints) لضمان كتابة كود نظيف وتسهيل الـ Code Review.

include: package:flutter_lints/flutter.yaml

analyzer:
  language:
    strict-casts: true
    strict-inference: true
    strict-raw-types: true
  exclude:
    - "**/*.g.dart"
    - "**/*.freezed.dart"
    - "build/**"

linter:
  rules:
    # قواعد تنظيم وتوحيد كتابة الكود (Code Style & Formatting)
    - always_declare_return_types
    - avoid_empty_else
    - avoid_print                 # يمنع استخدام print في الإنتاج، ويجبر على استخدام Logger مناسب
    - avoid_relative_lib_imports  # يمنع استيراد الملفات بطريقة نسبية خارج lib
    - avoid_shadowing_type_parameters
    - avoid_types_as_parameter_names
    - await_only_futures
    - camel_case_extensions
    - camel_case_types
    - cancel_subscriptions        # يمنع نسيان إغلاق الـ Stream Subscriptions (تجنب الـ Memory Leaks)
    - close_sinks                 # يمنع نسيان إغلاق الـ Stream Sinks
    - curly_braces_in_flow_control_structures
    - empty_catches
    - file_names
    - hash_and_equals
    - no_duplicate_case_values
    - non_constant_identifier_names
    - prefer_conditional_assignment
    - prefer_const_constructors    # ينصح باستخدام const لتقليل عمليات الـ Rebuild
    - prefer_const_constructors_in_immutables
    - prefer_const_declarations
    - prefer_const_literals_to_create_immutables
    - prefer_final_fields         # يضمن حماية البيانات داخل الكلاسات
    - prefer_final_locals         # يحفز على عدم تعديل المتغيرات المحلية بعد تعريفها
    - prefer_is_empty
    - prefer_is_not_empty
    - prefer_iterable_whereType
    - prefer_single_quotes        # توحيد استخدام الـ Single Quotes للـ Strings
    - slash_for_doc_comments
    - type_init_formals
    - unawaited_futures           # يجبر المطور على التعامل مع الـ Futures (إما await أو unawaited)
    - unnecessary_const
    - unnecessary_new
    - unnecessary_null_aware_assignments
    - unnecessary_nullable_for_final_variable_declarations
    - unnecessary_string_interpolations
    - use_build_context_synchronously # قاعدة هامة جداً لمنع استخدام الـ BuildContext بعد عمليات الـ async
    - use_key_in_widget_constructors  # يفرض وجود Key في الـ Widgets
