name: main_app
description: The main Flutter application assembling all packages.
version: 1.0.0
publish_to: 'none'

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.0.0'

dependencies:
  flutter:
    sdk: flutter
  get_it: ^7.6.0
  go_router: ^13.0.0
  flutter_bloc: ^8.1.3

  # اعتمادات الحزم المحلية (Local Monorepo Packages)
  core_network:
    path: ../../packages/core/core_network
  core_storage:
    path: ../../packages/core/core_storage
  core_ui:
    path: ../../packages/core/core_ui
  feat_auth:
    path: ../../packages/features/feat_auth

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
